<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Free Model Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
  :root {
    --bg: #0d0f13;
    --panel: #14171d;
    --panel-2: #1a1e26;
    --border: #262b35;
    --text: #e7e9ee;
    --text-dim: #8b909c;
    --accent: #5b8cff;
    --accent-dim: #2c3a5e;
    --good: #4ade80;
    --warn: #f59e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
  }
  #app { display: flex; height: 100vh; }

  /* Sidebar */
  #sidebar {
    width: 260px; background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  #sidebar-header { padding: 14px; border-bottom: 1px solid var(--border); }
  #newChatBtn {
    width: 100%; padding: 10px; border-radius: 8px; border: none;
    background: var(--accent); color: white; font-weight: 600; cursor: pointer; font-size: 13px;
  }
  #newChatBtn:hover { background: #4a7aef; }
  #sessionList { flex: 1; overflow-y: auto; padding: 8px; }
  .session-item {
    padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
    color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .session-item:hover { background: var(--panel-2); }
  .session-item.active { background: var(--accent-dim); color: var(--text); }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #topbar {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    border-bottom: 1px solid var(--border); background: var(--panel);
  }
  #modelSelect {
    flex: 1; max-width: 420px; padding: 8px 10px; border-radius: 6px;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text); font-size: 13px;
  }
  .badge {
    font-size: 11px; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border);
    color: var(--text-dim); white-space: nowrap;
  }
  .badge.tools { color: var(--good); border-color: #2c4a36; }
  .badge.reason { color: var(--warn); border-color: #4a3a1c; }
  #modelInfo { font-size: 12px; color: var(--text-dim); display: flex; gap: 6px; align-items: center; }

  #tabBar { display: flex; gap: 4px; padding: 0 16px; border-bottom: 1px solid var(--border); background: var(--panel); }
  .tab { padding: 8px 14px; font-size: 13px; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  #chatView, #dashboardView { flex: 1; overflow: hidden; display: none; flex-direction: column; }
  #chatView.visible, #dashboardView.visible { display: flex; }

  #chatLog { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: 10px; line-height: 1.5; font-size: 14px; }
  .msg.user { background: var(--accent-dim); align-self: flex-end; }
  .msg.assistant { background: var(--panel-2); align-self: flex-start; border: 1px solid var(--border); }
  .msg pre { background: #0a0c10; padding: 10px; border-radius: 6px; overflow-x: auto; }
  .msg code { font-family: "SF Mono", Menlo, monospace; font-size: 13px; }
  .tool-tag { font-size: 11px; color: var(--good); margin-bottom: 6px; display: block; }

  #inputBar { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--panel); }
  #input {
    flex: 1; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel-2); color: var(--text); font-size: 14px; resize: none; font-family: inherit;
  }
  #sendBtn {
    padding: 0 22px; border-radius: 8px; border: none; background: var(--accent);
    color: white; font-weight: 600; cursor: pointer;
  }
  #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }

  #debugToggle { font-size: 12px; color: var(--text-dim); cursor: pointer; }
  #debugPanel {
    display: none; max-height: 200px; overflow-y: auto; background: #0a0c10;
    border-top: 1px solid var(--border); padding: 10px 20px; font-size: 11px;
    color: var(--text-dim); white-space: pre-wrap; font-family: monospace;
  }
  #debugPanel.visible { display: block; }

  /* Dashboard */
  #dashboardView { padding: 20px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-dim); font-weight: 500; }
  tr:hover { background: var(--panel-2); }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <button id="newChatBtn" onclick="newSession()">+ New Chat</button>
    </div>
    <div id="sessionList"></div>
  </div>

  <div id="main">
    <div id="topbar">
      <select id="modelSelect" onchange="onModelChange()"></select>
      <div id="modelInfo"></div>
    </div>

    <div id="tabBar">
      <div class="tab active" id="chatTab" onclick="showTab('chat')">Chat</div>
      <div class="tab" id="dashTab" onclick="showTab('dashboard')">Model Dashboard (<span id="modelCount">0</span>)</div>
    </div>

    <div id="chatView" class="visible">
      <div id="chatLog"></div>
      <div id="debugPanel"></div>
      <div id="inputBar">
        <textarea id="input" rows="1" placeholder="Message... (try: 'what is 23*17?')" onkeydown="handleKey(event)"></textarea>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
      <div style="padding: 4px 20px 10px; background: var(--panel);">
        <span id="debugToggle" onclick="toggleDebug()">Show raw response ▾</span>
      </div>
    </div>

    <div id="dashboardView">
      <table>
        <thead>
          <tr><th>Model</th><th>Context</th><th>Input</th><th>Tools</th><th>Reasoning</th><th>Description</th></tr>
        </thead>
        <tbody id="dashboardBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let sessionId = null;
  let models = [];
  let lastRaw = null;

  marked.setOptions({ breaks: true });

  async function loadModels() {
    const res = await fetch("/api/models");
    models = await res.json();
    document.getElementById("modelCount").textContent = models.length;

    const select = document.getElementById("modelSelect");
    select.innerHTML = "";
    for (const m of models) {
      const opt = document.createElement("option");
      opt.value = m.id;
      opt.textContent = m.name;
      select.appendChild(opt);
    }
    onModelChange();
    renderDashboard();
  }

  function renderDashboard() {
    const body = document.getElementById("dashboardBody");
    body.innerHTML = "";
    for (const m of models) {
      const tr = document.createElement("tr");
      tr.innerHTML = \`
        <td>\${m.name}</td>
        <td>\${(m.context_length / 1000).toFixed(0)}K</td>
        <td>\${m.input_modalities.join(", ")}</td>
        <td>\${m.supports_tools ? "✓" : "—"}</td>
        <td>\${m.supports_reasoning ? "✓" : "—"}</td>
        <td style="color: var(--text-dim); font-size:12px;">\${m.description}</td>
      \`;
      tr.onclick = () => {
        document.getElementById("modelSelect").value = m.id;
        onModelChange();
        showTab("chat");
      };
      body.appendChild(tr);
    }
  }

  function onModelChange() {
    const id = document.getElementById("modelSelect").value;
    const m = models.find((x) => x.id === id);
    if (!m) return;
    const info = document.getElementById("modelInfo");
    info.innerHTML = \`
      <span class="badge">\${(m.context_length/1000).toFixed(0)}K ctx</span>
      \${m.supports_tools ? '<span class="badge tools">tools</span>' : ''}
      \${m.supports_reasoning ? '<span class="badge reason">reasoning</span>' : ''}
      \${m.input_modalities.includes('image') ? '<span class="badge">vision</span>' : ''}
    \`;
  }

  function showTab(tab) {
    document.getElementById("chatTab").classList.toggle("active", tab === "chat");
    document.getElementById("dashTab").classList.toggle("active", tab === "dashboard");
    document.getElementById("chatView").classList.toggle("visible", tab === "chat");
    document.getElementById("dashboardView").classList.toggle("visible", tab === "dashboard");
  }

  async function loadSessions() {
    const res = await fetch("/api/sessions");
    const sessions = await res.json();
    const list = document.getElementById("sessionList");
    list.innerHTML = "";
    for (const s of sessions) {
      const div = document.createElement("div");
      div.className = "session-item" + (s.id === sessionId ? " active" : "");
      div.textContent = s.title ? s.title.slice(0, 40) : "(empty chat)";
      div.onclick = () => loadSession(s.id, s.model);
      list.appendChild(div);
    }
  }

  async function loadSession(id, model) {
    sessionId = id;
    document.getElementById("modelSelect").value = model;
    onModelChange();
    const res = await fetch(\`/api/sessions/\${id}/messages\`);
    const msgs = await res.json();
    const log = document.getElementById("chatLog");
    log.innerHTML = "";
    for (const m of msgs) addMessage(m.role, m.content);
    loadSessions();
  }

  async function newSession() {
    const model = document.getElementById("modelSelect").value;
    const res = await fetch("/api/sessions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model }),
    });
    const data = await res.json();
    sessionId = data.sessionId;
    document.getElementById("chatLog").innerHTML = "";
    document.getElementById("debugPanel").textContent = "";
    loadSessions();
  }

  function addMessage(role, text, toolsUsed) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    let html = "";
    if (toolsUsed && toolsUsed.length) {
      html += \`<span class="tool-tag">🔧 used: \${toolsUsed.map(t => t.name).join(", ")}</span>\`;
    }
    html += role === "assistant" ? marked.parse(text) : text.replace(/</g, "&lt;");
    div.innerHTML = html;
    document.getElementById("chatLog").appendChild(div);
    div.scrollIntoView({ behavior: "smooth" });
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function toggleDebug() {
    const panel = document.getElementById("debugPanel");
    const visible = panel.classList.toggle("visible");
    document.getElementById("debugToggle").textContent = visible ? "Hide raw response ▴" : "Show raw response ▾";
    if (visible && lastRaw) panel.textContent = JSON.stringify(lastRaw, null, 2);
  }

  async function sendMessage() {
    if (!sessionId) await newSession();

    const input = document.getElementById("input");
    const model = document.getElementById("modelSelect").value;
    const text = input.value.trim();
    if (!text) return;

    addMessage("user", text);
    input.value = "";
    document.getElementById("sendBtn").disabled = true;

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId, model, message: text }),
      });
      const data = await res.json();

      if (data.error) {
        addMessage("assistant", "**Error:** " + JSON.stringify(data.error));
      } else {
        addMessage("assistant", data.reply, data.toolsUsed);
        lastRaw = data.raw;
        if (document.getElementById("debugPanel").classList.contains("visible")) {
          document.getElementById("debugPanel").textContent = JSON.stringify(lastRaw, null, 2);
        }
        loadSessions();
      }
    } catch (err) {
      addMessage("assistant", "**Network error:** " + err.message);
    } finally {
      document.getElementById("sendBtn").disabled = false;
    }
  }

  (async function init() {
    await loadModels();
    await loadSessions();
  })();
</script>
</body>
</html>
